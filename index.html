<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>今日のお弁当なーに？</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#FFFDF7;--sur:#FFF;--dark:#2C2416;--muted:#9A8C78;--bdr:rgba(44,36,22,0.1);
  --green:#4A7C3F;--gl:#E8F5E4;--gd:#3A6030;
  --orange:#D4691E;--ol:#FFF0E4;--od:#A84E10;
  --yellow:#C49A20;--yl:#FFF8DC;
  --pink:#C45A70;--pl:#FFE8EE;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--dark);font-size:14px;min-height:100vh;}
.hdr{background:linear-gradient(135deg,#4A7C3F,#6A9A5A);padding:12px 16px 0;position:sticky;top:0;z-index:100;}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.hdr-ico{width:38px;height:38px;background:rgba(255,255,255,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.hdr h1{font-family:'Zen Maru Gothic',sans-serif;color:#fff;font-size:18px;font-weight:700;line-height:1.2;}
.hdr p{color:rgba(255,255,255,0.8);font-size:11px;margin-top:1px;}
.badge-off{background:rgba(255,255,255,0.2);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:auto;flex-shrink:0;}
.person-bar{background:rgba(0,0,0,0.15);display:flex;padding:8px 12px;gap:6px;}
.pb{flex:1;padding:8px 4px;border:none;border-radius:10px;background:transparent;color:rgba(255,255,255,0.75);font-family:'Zen Maru Gothic',sans-serif;font-size:12px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;touch-action:manipulation;transition:all .2s;}
.pb .pi{font-size:20px;}
.pb.on{background:rgba(255,255,255,0.95);color:var(--green);font-weight:700;}
.tab-bar{display:flex;background:var(--sur);border-bottom:1px solid var(--bdr);}
.tb{flex:1;padding:9px 4px 7px;border:none;background:none;cursor:pointer;border-bottom:2.5px solid transparent;font-family:'Noto Sans JP',sans-serif;font-size:11px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:2px;touch-action:manipulation;transition:all .15s;}
.tb .ti{font-size:17px;}
.tb.on{color:var(--green);border-bottom-color:var(--green);font-weight:700;}
.note-bar{background:var(--gl);padding:7px 14px;font-size:11px;color:var(--gd);display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(74,124,63,0.15);}
.lo-bar{background:var(--ol);border-bottom:1px solid rgba(212,105,30,0.2);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;}
.lo-lbl{font-size:12px;color:var(--od);font-weight:700;}
.lo-btn{background:var(--sur);color:var(--muted);border:1px solid var(--bdr);border-radius:20px;padding:5px 14px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;touch-action:manipulation;}
.lo-btn.on{background:var(--orange);color:#fff;border-color:var(--orange);}
.fridge-top{padding:10px 14px 6px;display:flex;justify-content:space-between;align-items:center;}
.fridge-top h2{font-family:'Zen Maru Gothic',sans-serif;font-size:16px;font-weight:700;}
.reset-btn{font-size:11px;color:var(--pink);border:1px solid rgba(196,90,112,0.25);background:none;padding:4px 10px;border-radius:20px;cursor:pointer;touch-action:manipulation;}
.cat-tabs{display:flex;overflow-x:auto;padding:0 14px;scrollbar-width:none;border-bottom:1px solid var(--bdr);}
.cat-tabs::-webkit-scrollbar{display:none;}
.ct{flex-shrink:0;padding:7px 12px 5px;font-size:12px;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;touch-action:manipulation;}
.ct.on{color:var(--dark);border-bottom-color:var(--dark);font-weight:700;}
.ing-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;padding:12px 14px 160px;}
.ic{background:var(--sur);border:1.5px solid var(--bdr);border-radius:12px;padding:9px 4px 7px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;position:relative;user-select:none;min-height:82px;justify-content:center;transition:all .12s;touch-action:manipulation;}
.ic:active{transform:scale(0.92);}
.ic.on{background:var(--gl);border-color:var(--green);}
.ie{font-size:24px;line-height:1;}
.in{font-size:10px;text-align:center;line-height:1.3;font-weight:500;}
.ichk{position:absolute;top:4px;right:4px;width:14px;height:14px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:8px;font-weight:900;}
.gen-area{position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--bdr);padding:12px 14px;padding-bottom:max(12px,env(safe-area-inset-bottom));}
.gen-btn{width:100%;padding:14px;background:linear-gradient(135deg,#4A7C3F,#5A9A4A);color:#fff;border:none;border-radius:14px;font-family:'Zen Maru Gothic',sans-serif;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;touch-action:manipulation;transition:all .15s;box-shadow:0 4px 14px rgba(74,124,63,0.3);}
.gen-btn:active{transform:scale(0.97);}
.gen-btn:disabled{background:#C0BAB0;box-shadow:none;cursor:not-allowed;}
.quick-bar{display:flex;justify-content:center;margin-top:8px;}
.qbtn{display:flex;align-items:center;gap:6px;padding:7px 16px;border:1.5px solid var(--bdr);border-radius:30px;background:transparent;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:12px;color:var(--muted);touch-action:manipulation;}
.qbtn.on{background:var(--yl);border-color:var(--yellow);color:#7A6000;font-weight:700;}
.qdot{width:7px;height:7px;border-radius:50%;background:var(--muted);}
.qbtn.on .qdot{background:var(--yellow);}
.gen-hint{text-align:center;font-size:11px;color:var(--muted);margin-top:5px;}
.bento-wrap{padding:12px 14px 120px;}
.sel-sum{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:10px 12px;margin-bottom:10px;}
.sel-ttl{font-size:10px;color:var(--muted);margin-bottom:5px;font-weight:700;letter-spacing:1px;}
.schips{display:flex;flex-wrap:wrap;gap:4px;}
.sc{background:var(--gl);color:var(--gd);font-size:10px;padding:3px 8px;border-radius:20px;font-weight:500;}
.res-ttl{font-family:'Zen Maru Gothic',sans-serif;font-size:18px;font-weight:700;margin-bottom:12px;margin-top:14px;}
.bento-box{background:var(--sur);border:2px solid var(--green);border-radius:16px;overflow:hidden;margin-bottom:12px;}
.bento-hdr{background:var(--green);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
.bento-ttl{font-family:'Zen Maru Gothic',sans-serif;font-size:15px;font-weight:700;color:#fff;}
.bento-cal{font-size:12px;color:rgba(255,255,255,0.85);background:rgba(0,0,0,0.15);padding:3px 10px;border-radius:20px;}
.bento-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.bsec{padding:10px 12px;border-bottom:1px solid var(--bdr);}
.bsec.full{grid-column:1/-1;}
.bsec:last-child{border-bottom:none;}
.bs-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;color:#fff;display:inline-block;margin-bottom:4px;}
.bs-name{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:3px;}
.bs-desc{font-size:11px;color:#555;line-height:1.5;}
.rtog{background:none;border:1px solid var(--bdr);color:var(--muted);border-radius:8px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;margin-top:6px;touch-action:manipulation;}
.rsteps{display:none;margin-top:6px;padding-top:6px;border-top:1px solid var(--bdr);}
.rsteps.open{display:block;}
.step{display:flex;gap:6px;margin-bottom:5px;}
.snum{width:16px;height:16px;border-radius:50%;background:var(--green);color:#fff;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.stxt{font-size:11px;line-height:1.5;color:#333;}
.tip-box{background:var(--gl);border-radius:6px;padding:5px 8px;margin-top:4px;font-size:11px;color:var(--gd);}
.fav-btn{font-size:18px;border:none;background:none;cursor:pointer;padding:2px;line-height:1;touch-action:manipulation;}
.cc-wrap{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:12px 14px;margin-bottom:10px;}
.cc-ttl{font-family:'Zen Maru Gothic',sans-serif;font-size:14px;font-weight:700;margin-bottom:10px;}
.cc-row{display:flex;gap:8px;margin-bottom:10px;}
.cc-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.cc-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;border:2.5px solid transparent;}
.cc-dot.ok{border-color:var(--green);box-shadow:0 0 0 3px rgba(74,124,63,0.15);}
.cc-dot.ng{opacity:0.3;}
.cc-lbl{font-size:9px;color:var(--muted);font-weight:700;}
.cc-ok{font-size:12px;color:var(--green);font-weight:700;text-align:center;padding:6px;background:var(--gl);border-radius:8px;}
.cc-ng{font-size:12px;color:var(--orange);font-weight:700;text-align:center;padding:6px;background:var(--ol);border-radius:8px;}
.tip-card{background:var(--yl);border:1px solid rgba(196,154,32,0.25);border-radius:12px;padding:11px 13px;margin-bottom:10px;}
.tip-ttl{font-size:12px;font-weight:700;color:var(--yellow);margin-bottom:4px;}
.tip-txt{font-size:12px;color:var(--dark);line-height:1.7;}
.lo-tips{background:var(--ol);border:1px solid rgba(212,105,30,0.2);border-radius:12px;padding:11px 13px;margin-bottom:10px;}
.lo-item{margin-bottom:8px;}
.lo-name{font-size:12px;font-weight:700;color:var(--od);margin-bottom:2px;}
.lo-hint{font-size:11px;color:#555;line-height:1.6;}
.retry-btn{width:100%;padding:12px;background:transparent;border:2px solid var(--green);border-radius:12px;color:var(--green);font-family:'Zen Maru Gothic',sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;touch-action:manipulation;}
.deduct-btn{width:100%;margin-top:8px;padding:10px;background:var(--pl);border:1px solid rgba(196,90,112,0.2);border-radius:12px;color:var(--pink);font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;touch-action:manipulation;}
.nomatch{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:20px;text-align:center;color:var(--muted);margin-bottom:10px;font-size:13px;}
.fwrap{padding:12px 14px 100px;}
.fttl{font-family:'Zen Maru Gothic',sans-serif;font-size:17px;font-weight:700;margin-bottom:10px;}
.fcard{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:11px 12px;margin-bottom:8px;display:flex;align-items:flex-start;gap:8px;}
.fi{flex:1;min-width:0;}
.fn{font-size:13px;font-weight:700;color:var(--dark);}
.fsub{font-size:10px;color:var(--muted);margin-top:2px;}
.fdsc{font-size:11px;color:#555;margin-top:4px;line-height:1.5;}
.xbtn{font-size:16px;border:none;background:none;cursor:pointer;color:var(--muted);padding:2px;flex-shrink:0;}
.empty{text-align:center;padding:36px 16px;color:var(--muted);}
.empty p{font-size:12px;line-height:1.7;}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-ico">&#127857;</div>
    <div><h1>今日のお弁当なーに？</h1><p>冷蔵庫の食材でお弁当を提案</p></div>
    <span class="badge-off">&#128244; オフライン</span>
  </div>
  <div class="person-bar">
    <button class="pb on" id="pb-y" onclick="setPerson('y')"><span class="pi">&#128118;</span>幼稚園</button>
    <button class="pb" id="pb-e" onclick="setPerson('e')"><span class="pi">&#127872;</span>小学校</button>
    <button class="pb" id="pb-a" onclick="setPerson('a')"><span class="pi">&#128084;</span>大人</button>
  </div>
</div>
<div class="tab-bar">
  <button class="tb on" id="tb-ing" onclick="showTab('ing')"><span class="ti">&#129382;</span>食材</button>
  <button class="tb" id="tb-bento" onclick="showTab('bento')"><span class="ti">&#127857;</span>お弁当</button>
  <button class="tb" id="tb-favs" onclick="showTab('favs')"><span class="ti">&#10084;</span>お気に入り</button>
</div>
<div id="tab-ing">
  <div class="note-bar">&#129474; 調味料は全部ある前提 &#128244; 完全オフライン・無料</div>
  <div class="lo-bar">
    <span class="lo-lbl">&#9851; 残り物アレンジモード</span>
    <button class="lo-btn" id="loBtn" onclick="toggleLO()">OFF</button>
  </div>
  <div class="fridge-top"><h2>冷蔵庫の中身</h2><button class="reset-btn" onclick="resetFridge()">&#128465; リセット</button></div>
  <div class="cat-tabs" id="catTabs"></div>
  <div class="ing-grid" id="ingGrid"></div>
  <div class="gen-area">
    <button class="gen-btn" id="genBtn" onclick="generate()" disabled>&#127857; お弁当を考える！</button>
    <div class="quick-bar">
      <button class="qbtn" id="qBtn" onclick="toggleQuick()"><span class="qdot"></span>&#9889; 時短モード（15分以内）</button>
    </div>
    <p class="gen-hint" id="genHint">食材を1つ以上選んでください</p>
  </div>
</div>
<div id="tab-bento" style="display:none">
  <div class="bento-wrap">
    <div class="sel-sum"><div class="sel-ttl">選んだ食材</div><div class="schips" id="selChips"><span style="font-size:11px;color:var(--muted)">食材タブで選んでください</span></div></div>
    <button class="gen-btn" id="genBtn2" onclick="generate()" disabled style="margin-bottom:4px">&#127857; お弁当を考える！</button>
    <div class="quick-bar"><button class="qbtn" id="qBtn2" onclick="toggleQuick()"><span class="qdot"></span>&#9889; 時短モード（15分以内）</button></div>
    <div id="resultArea"></div>
  </div>
</div>
<div id="tab-favs" style="display:none"><div class="fwrap" id="favsWrap"></div></div>
<script>
var CATS = [

  {id:'corn-gohan', n:'とうもろこしごはん', d:'甘いコーンが混ざった彩り豊かなごはん', r:['rice','corn'], o:[], p:['y','e'], col:'yellow', cal:220, q:false, steps:['米にコーンを加えて一緒に炊く','バターと塩を加えて混ぜる','冷まして詰める'], tip:'バターを加えると風味アップ'},
  {id:'edamame-gohan', n:'枝豆ごはん', d:'枝豆の緑が映える彩りごはん', r:['rice','edamame'], o:[], p:['y','e','a'], col:'green', cal:240, q:true, steps:['枝豆を塩茹でしさやから出す','炊きたてごはんに混ぜる','塩で味を整える'], tip:'茹でたての枝豆で作ると甘みが増す'},
  {id:'maze-gohan', n:'混ぜごはん', d:'具材を混ぜ込んだ食べ応えのある一品', r:['rice'], o:['ninjin','gobo','kinoko'], p:['e','a'], col:'black', cal:260, q:false, steps:['具材をだし・醤油・みりんで煮る','ごはんに混ぜ込む','しっかり冷ます'], tip:'具材は細かく切ると混ぜやすい'},
  {id:'bacon-chahan', n:'ベーコンチャーハン', d:'ベーコンの塩気と卵がマッチ', r:['rice','bacon','tamago'], o:[], p:['e','a'], col:'black', cal:380, q:true, steps:['卵をご飯に混ぜる','ベーコンを炒める','ご飯を加えて強火で炒める'], tip:'強火で素早く炒めるとパラパラに'},
  {id:'sandoitchi', n:'サンドイッチ', d:'食べやすいサンドイッチ弁当', r:['bread'], o:['tamago','ham','kyuri','tomato'], p:['y','e','a'], col:'white', cal:300, q:true, steps:['パンにマヨネーズやバターを塗る','好きな具材を挟む','食べやすく切る'], tip:'水分の多い野菜はキッチンペーパーで拭く'},
  {id:'dry-curry', n:'ドライカレー', d:'スパイス香るドライカレー', r:['rice','beef'], o:['tamanegi'], p:['a'], col:'red', cal:380, q:false, steps:['玉ねぎ・ひき肉を炒める','カレー粉・コンソメで味付け','ごはんにのせる'], tip:'汁気をしっかり飛ばすこと'},
  {id:'ebi-pilaf', n:'えびピラフ', d:'プリプリえびが入った本格ピラフ', r:['rice','shrimp'], o:['tamanegi','butter'], p:['e','a'], col:'red', cal:280, q:false, steps:['玉ねぎをバターで炒める','えびを加えて炒める','米を加えスープで炊く'], tip:'前日夜に炊いておくと朝が楽'}
];

var LEFTOVERS = [
  {name:'昨夜の唐揚げ', hint:'冷めても美味しい。レモンを絞るとさっぱりリフレッシュ。'},
  {name:'昨夜のハンバーグ', hint:'ミニサイズにカットしてそのままIN。ケチャップを少し追加すると美味。'},
  {name:'昨夜の肉じゃが', hint:'じゃがいもをつぶして肉と混ぜてコロッケ風に。'},
  {name:'昨夜のカレー', hint:'ごはんと混ぜてカレーピラフに。'},
  {name:'昨夜の焼き魚', hint:'身をほぐしてフレークにし、おにぎりの具に。'},
  {name:'昨夜の煮物', hint:'汁気を切ってそのままサブおかずに。一口サイズにカットして詰める。'}
];

var COLOR_DEF = {
  red:{label:'赤', emoji:'&#x1F534;', items:['tomato','ninjin','paprika','sausage','wiener','bacon','ham','shrimp','salmon','beef']},
  green:{label:'緑', emoji:'&#x1F7E2;', items:['brocco','horenso','edamame','kyuri','nori']},
  yellow:{label:'黄', emoji:'&#x1F7E1;', items:['tamago','corn','cheese','jagaimo','kayaku','pasta']},
  white:{label:'白', emoji:'&#x26AA;', items:['rice','bread','milk','tofu','tamanegi','chicken','pork','tuna','chikuwa']},
  black:{label:'黒', emoji:'&#x26AB;', items:['nori','gobo','kinoko','saba']}
};

var PACKING_TIPS = [
  'ごはんは必ず完全に冷ましてから詰めること。温かいと菌が繁殖しやすくなります。',
  'おかずもしっかり冷ましてから。カップを使うと汁が混ざらず食べやすい。',
  '大きいおかずから先に詰めると、隙間を小さいおかずで埋めやすい。',
  '隙間はきゅうり・プチトマト・枝豆などで埋めると彩り良く詰まります。',
  '汁気の多いおかずはシリコンカップに入れるとごはんがべちゃつかない。'
];

var QUICK_IDS = {
  'tamagoyaki':1,'takosan':1,'tuna-mayo':1,'tama-soboro':1,
  'wiener-saute':1,'ebi-mayo':1,'ham-egg':1,'sausage-amakarai':1,
  'ebi-butter':1,'saba-miso':1,'pork-salt':1,
  'edamame-side':1,'mini-tomato':1,'corn-saute':1,'cheese-side':1,
  'paprika-saute':1,'tamagoyaki-sub':1,'tuna-mayo-corn':1,
  'brocco-tuna':1,'paprika-tuna':1,'corn-cheese':1,
  'edamame-cheese':1,'horenso-butter':1,'corn-butter-shoyu':1,
  'edamame-goma':1,'cheese-tomato':1,'chikuwa-kyuri':1,'ninjin-tuna':1,
  'shiro-gohan':1,'onigiri':1,'furikake-gohan':1,'nori-ben':1,
  'salmon-onigiri':1,'tuna-onigiri':1,'edamame-gohan':1,'bacon-chahan':1,'sandoitchi':1
};

var PERSON_LABELS = {y:'幼稚園', e:'小学校', a:'大人'};
var activeCat = 'veg';
var fridge = {};
var favBentos = [];
var lastR = null;
var lastSnap = {};
var person = 'y';
var loMode = false;
var quickMode = false;

function lg(k, fb) { try { var v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch(e) { return fb; } }
function ls(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }

function init() {
  fridge = lg('bento-fridge', {});
  favBentos = lg('bento-favs', []);
  renderCatTabs();
  renderGrid();
  updateBtn();
}

function setPerson(p) {
  person = p;
  ['y','e','a'].forEach(function(x) {
    document.getElementById('pb-' + x).classList.toggle('on', x === p);
  });
  updateBtn();
}

function toggleLO() {
  loMode = !loMode;
  var btn = document.getElementById('loBtn');
  btn.textContent = loMode ? 'ON' : 'OFF';
  btn.classList.toggle('on', loMode);
}

function toggleQuick() {
  quickMode = !quickMode;
  ['qBtn','qBtn2'].forEach(function(id) {
    var b = document.getElementById(id);
    if (b) b.classList.toggle('on', quickMode);
  });
  updateBtn();
}

function showTab(t) {
  ['ing','bento','favs'].forEach(function(x) {
    document.getElementById('tab-' + x).style.display = x === t ? 'block' : 'none';
    document.getElementById('tb-' + x).classList.toggle('on', x === t);
  });
  if (t === 'bento') { renderSum(); if (lastR) renderResult(lastR); }
  if (t === 'favs') renderFavs();
}

function renderCatTabs() {
  var html = '';
  CATS.forEach(function(c) {
    html += '<button class="ct ' + (c.id === activeCat ? 'on' : '') + '" onclick="switchCat(\'' + c.id + '\')">' + c.name + '</button>';
  });
  document.getElementById('catTabs').innerHTML = html;
}

function switchCat(id) { activeCat = id; renderCatTabs(); renderGrid(); }

function renderGrid() {
  var cat = null;
  CATS.forEach(function(c) { if (c.id === activeCat) cat = c; });
  if (!cat) return;
  var html = '';
  cat.items.forEach(function(item) {
    var sel = fridge[item.id];
    html += '<div class="ic ' + (sel ? 'on' : '') + '" onclick="toggleIng(\'' + item.id + '\')">';
    if (sel) html += '<div class="ichk">&#10003;</div>';
    html += '<div class="ie">' + item.e + '</div>';
    html += '<div class="in">' + item.n + '</div>';
    html += '</div>';
  });
  document.getElementById('ingGrid').innerHTML = html;
}

function toggleIng(id) {
  var cat = null;
  CATS.forEach(function(c) { c.items.forEach(function(i) { if (i.id === id) cat = i; }); });
  if (!cat) return;
  if (fridge[id]) delete fridge[id];
  else fridge[id] = {item: cat, qty: 1};
  ls('bento-fridge', fridge);
  renderGrid();
  updateBtn();
}

function resetFridge() {
  if (!confirm('リセットしますか？')) return;
  fridge = {};
  ls('bento-fridge', fridge);
  renderGrid();
  updateBtn();
}

function updateBtn() {
  var n = Object.keys(fridge).length;
  ['genBtn','genBtn2'].forEach(function(id) {
    var b = document.getElementById(id);
    if (b) b.disabled = !n;
  });
  var h = document.getElementById('genHint');
  if (h) {
    if (!n) h.textContent = '食材を1つ以上選んでください';
    else if (quickMode) h.textContent = '⚡ 時短モード ON — ' + PERSON_LABELS[person] + '弁当を考えます';
    else h.textContent = n + '種類の食材で' + PERSON_LABELS[person] + '弁当を考えます';
  }
}

function renderSum() {
  var keys = Object.keys(fridge);
  var b = document.getElementById('genBtn2');
  if (b) b.disabled = !keys.length;
  var c = document.getElementById('selChips');
  if (!c) return;
  if (!keys.length) { c.innerHTML = '<span style="font-size:11px;color:var(--muted)">食材タブで選んでください</span>'; return; }
  var html = '';
  keys.forEach(function(k) { html += '<span class="sc">' + fridge[k].item.e + ' ' + fridge[k].item.n + '</span>'; });
  c.innerHTML = html;
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function matchPool(pool, ids) {
  var results = pool.filter(function(r) {
    if (!r.p.includes(person)) return false;
    if (!r.r.every(function(x) { return ids.includes(x); })) return false;
    if (quickMode && !QUICK_IDS[r.id]) return false;
    return true;
  });
  return shuffle(results);
}

function generate() {
  var ids = Object.keys(fridge);
  if (!ids.length) return;
  lastSnap = JSON.parse(JSON.stringify(fridge));
  var mains = matchPool(MAIN, ids);
  var sides = matchPool(SIDES, ids);
  var rices = matchPool(RICE, ids);
  var main = mains[0] || null;
  var side1 = sides[0] || null;
  var side2 = null;
  for (var i = 1; i < sides.length; i++) { if (sides[i].id !== (side1 ? side1.id : '')) { side2 = sides[i]; break; } }
  var rice = rices[0] || null;
  var allIds = [];
  if (main) allIds = allIds.concat(main.r).concat(main.o);
  if (side1) allIds = allIds.concat(side1.r).concat(side1.o);
  if (side2) allIds = allIds.concat(side2.r).concat(side2.o);
  if (rice) allIds = allIds.concat(rice.r).concat(rice.o);
  var colors = {};
  Object.keys(COLOR_DEF).forEach(function(col) {
    colors[col] = allIds.some(function(id) { return COLOR_DEF[col].items.includes(id); });
  });
  var cal = (main ? main.cal : 0) + (side1 ? side1.cal : 0) + (side2 ? side2.cal : 0) + (rice ? rice.cal : 0);
  var tip = PACKING_TIPS[Math.floor(Math.random() * PACKING_TIPS.length)];
  lastR = {main:main, side1:side1, side2:side2, rice:rice, colors:colors, cal:cal, tip:tip};
  showTab('bento');
  renderResult(lastR);
}

function renderResult(d) {
  var ra = document.getElementById('resultArea');
  if (!ra) return;
  var badges = {main:'#D4691E', sub:'#4A7C3F', rice:'#C49A20'};
  function renderSec(item, label, color, fullWidth) {
    var cls = 'bsec' + (fullWidth ? ' full' : '');
    if (!item) return '<div class="' + cls + '"><span class="bs-badge" style="background:' + color + '">' + label + '</span><div class="bs-name" style="color:var(--muted)">なし（食材を追加してみてください）</div></div>';
    var sid = 'rs' + item.id + Math.floor(Math.random()*9999);
    var steps = '';
    (item.steps || []).forEach(function(s, j) {
      steps += '<div class="step"><div class="snum">' + (j+1) + '</div><div class="stxt">' + s + '</div></div>';
    });
    var togHtml = steps ? '<button class="rtog" id="rtb' + sid + '" onclick="togR(\'' + sid + '\')">作り方を見る</button><div class="rsteps" id="' + sid + '">' + steps + (item.tip ? '<div class="tip-box">&#x1F4A1; ' + item.tip + '</div>' : '') + '</div>' : '';
    return '<div class="' + cls + '"><span class="bs-badge" style="background:' + color + '">' + label + '</span><div class="bs-name">' + item.n + '</div><div class="bs-desc">' + item.d + '</div>' + togHtml + '</div>';
  }
  var isFav = favBentos.some(function(f) { return f.mainName === (d.main ? d.main.n : ''); });
  var ccRow = '';
  Object.keys(COLOR_DEF).forEach(function(col) {
    ccRow += '<div class="cc-item"><div class="cc-dot ' + (d.colors[col] ? 'ok' : 'ng') + '">' + COLOR_DEF[col].emoji + '</div><div class="cc-lbl">' + COLOR_DEF[col].label + '</div></div>';
  });
  var colorOk = Object.values(d.colors).filter(Boolean).length;
  var colorMsg = colorOk >= 4 ?
    '<div class="cc-ok">&#10024; 彩りバッチリ！見た目も美味しいお弁当です</div>' :
    '<div class="cc-ng">&#127912; 足りない色を足すとさらに素敵に！</div>';
  var loHtml = '';
  if (loMode) {
    var litems = '';
    LEFTOVERS.forEach(function(lo) {
      litems += '<div class="lo-item"><div class="lo-name">' + lo.name + '</div><div class="lo-hint">' + lo.hint + '</div></div>';
    });
    loHtml = '<div class="lo-tips"><div class="tip-ttl" style="color:var(--od)">&#9851; 残り物アレンジアイデア</div>' + litems + '</div>';
  }
  ra.innerHTML =
    '<div class="res-ttl">&#127857; ' + PERSON_LABELS[person] + 'のお弁当</div>' +
    '<div class="bento-box">' +
      '<div class="bento-hdr"><span class="bento-ttl">本日のお弁当</span><div style="display:flex;align-items:center;gap:8px;"><span class="bento-cal">&#x1F525; 約' + d.cal + 'kcal</span><button class="fav-btn" id="favBtn" onclick="toggleFav()">' + (isFav ? '&#10084;' : '&#x1F90D;') + '</button></div></div>' +
      '<div class="bento-grid">' +
        renderSec(d.main, 'メイン', badges.main, false) +
        renderSec(d.rice, 'ごはん', badges.rice, false) +
        renderSec(d.side1, 'サブ①', badges.sub, false) +
        renderSec(d.side2, 'サブ②', badges.sub, false) +
      '</div>' +
    '</div>' +
    '<div class="cc-wrap"><div class="cc-ttl">&#127752; 彩りチェック <span style="font-size:12px;color:var(--muted);font-weight:400">' + colorOk + '/5色</span></div><div class="cc-row">' + ccRow + '</div>' + colorMsg + '</div>' +
    '<div class="tip-card"><div class="tip-ttl">&#127857; 詰め方のコツ</div><div class="tip-txt">' + d.tip + '</div></div>' +
    loHtml +
    '<button class="deduct-btn" onclick="deduct()">&#128465; 使った食材を冷蔵庫から差し引く</button>' +
    '<button class="retry-btn" onclick="generate()">&#x1F500; 違うお弁当を提案してもらう</button>';
}

function togR(id) {
  var el = document.getElementById(id);
  var btn = document.getElementById('rtb' + id);
  if (!el || !btn) return;
  el.classList.toggle('open');
  btn.textContent = el.classList.contains('open') ? '▲ 閉じる' : '作り方を見る';
}

function deduct() {
  if (!confirm('使った食材を差し引きますか？')) return;
  Object.keys(lastSnap).forEach(function(id) {
    if (fridge[id]) { fridge[id].qty = Math.max(0, Math.round((fridge[id].qty - lastSnap[id].qty) * 10) / 10); if (fridge[id].qty <= 0) delete fridge[id]; }
  });
  ls('bento-fridge', fridge);
  alert('完了！');
}

function toggleFav() {
  if (!lastR || !lastR.main) return;
  var key = lastR.main.n;
  var idx = -1;
  favBentos.forEach(function(f, i) { if (f.mainName === key) idx = i; });
  if (idx >= 0) favBentos.splice(idx, 1);
  else favBentos.push({id: Date.now(), mainName: key, person: PERSON_LABELS[person], cal: lastR.cal, side1: lastR.side1 ? lastR.side1.n : '', side2: lastR.side2 ? lastR.side2.n : '', rice: lastR.rice ? lastR.rice.n : ''});
  ls('bento-favs', favBentos);
  var btn = document.getElementById('favBtn');
  var isFav = favBentos.some(function(f) { return f.mainName === key; });
  if (btn) btn.innerHTML = isFav ? '&#10084;' : '&#x1F90D;';
}

function renderFavs() {
  var w = document.getElementById('favsWrap');
  if (!favBentos.length) { w.innerHTML = '<div class="empty"><p>お弁当の&#10084;を押すと<br>ここに保存されます</p></div>'; return; }
  var html = '<div class="fttl">&#10084; お気に入りのお弁当</div>';
  favBentos.forEach(function(f) {
    html += '<div class="fcard"><div class="fi"><div class="fn">&#127857; ' + f.mainName + '</div><div class="fsub">' + f.person + '弁当 / 約' + f.cal + 'kcal</div><div class="fdsc">' + [f.rice, f.side1, f.side2].filter(Boolean).join(' / ') + '</div></div><button class="xbtn" onclick="delFav(' + f.id + ')">&#10005;</button></div>';
  });
  w.innerHTML = html;
}

function delFav(id) {
  favBentos = favBentos.filter(function(f) { return f.id !== id; });
  ls('bento-favs', favBentos);
  renderFavs();
}

init();
</script>

</html>
